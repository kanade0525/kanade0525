name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: kanade0525
          BRANCH_NAME: output
          UTC_OFFSET: 9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
